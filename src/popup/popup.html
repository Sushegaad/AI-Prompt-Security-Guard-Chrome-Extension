<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Safety Guard</title>
  <link rel="stylesheet" href="../shared/fonts.css" />
  <link rel="stylesheet" href="../shared/tokens.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="asg-root">
  <header class="popup-header">
    <span class="wordmark"><span class="wordmark__dot"></span>AI Safety Guard</span>
    <span class="status">Protecting this tab</span>
  </header>

  <!-- Populated by popup.js from live settings. -->
  <main class="popup-body" id="popup-body"></main>

  <footer class="popup-footer">
    <span class="version" id="version">v1.0.0</span>
    <button class="asg-btn asg-btn--link" id="privacy-link">Privacy &amp; settings</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
